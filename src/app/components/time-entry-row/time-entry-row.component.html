<div class="entry-row">
  <!-- Entry number -->
  <div class="entry-num">{{ entryNumber }}</div>

  <!-- Description (inline editable) -->
  <div class="entry-description">
    @if (editing) {
      <input
        class="desc-input"
        type="text"
        [(ngModel)]="editValue"
        (blur)="saveEdit()"
        (keydown)="onDescriptionKey($event)"
        autofocus
      />
    } @else {
      <span
        class="desc-text"
        [class.placeholder]="!entry.description"
        (click)="startEdit()"
      >
        {{ entry.description || 'Add description' }}
      </span>
    }
  </div>

  <!-- Project selector -->
  <button class="project-btn" [matMenuTriggerFor]="rowProjectMenu" [class.has-project]="!!project">
    @if (!project) {
      <mat-icon class="add-icon">add_circle_outline</mat-icon>
      <span>Project</span>
    } @else {
      <span class="project-dot" [style.background]="project.color"></span>
      <span class="project-label" [style.color]="project.color">{{ project.name }}</span>
    }
  </button>

  <mat-menu #rowProjectMenu="matMenu">
    <button mat-menu-item (click)="selectProject(null)">
      <mat-icon>block</mat-icon>No project
    </button>
    @for (p of projects(); track p.id) {
      <button mat-menu-item (click)="selectProject(p.id)">
        <span class="menu-dot" [style.background]="p.color"></span>
        {{ p.name }}
      </button>
    }
    <mat-divider />
    <button mat-menu-item (click)="openCreateProject()">
      <mat-icon>add</mat-icon>Create project
    </button>
  </mat-menu>

  <div class="entry-right">
    <!-- Tags -->
    <button
      mat-icon-button
      class="icon-btn"
      [class.active-icon]="entry.tags.length > 0"
      matTooltip="Tags"
    >
      <mat-icon>sell</mat-icon>
    </button>

    <!-- Billable -->
    <button
      mat-icon-button
      class="icon-btn"
      [class.active-icon]="entry.billable"
      matTooltip="Billable"
      (click)="toggleBillable()"
    >
      <mat-icon>attach_money</mat-icon>
    </button>

    <!-- Time range -->
    <span class="time-range">{{ startTime }} &ndash; {{ endTime }}</span>

    <!-- Calendar (placeholder) -->
    <button mat-icon-button class="icon-btn" matTooltip="Edit time">
      <mat-icon>calendar_today</mat-icon>
    </button>

    <!-- Duration -->
    <span class="duration">{{ duration }}</span>

    <!-- Continue/Play -->
    <button mat-icon-button class="icon-btn" matTooltip="Continue" (click)="continueTimer()">
      <mat-icon>play_arrow</mat-icon>
    </button>

    <!-- More options -->
    <button mat-icon-button class="icon-btn" [matMenuTriggerFor]="moreMenu" matTooltip="More">
      <mat-icon>more_vert</mat-icon>
    </button>
    <mat-menu #moreMenu="matMenu">
      <button mat-menu-item (click)="duplicate()">
        <mat-icon>content_copy</mat-icon>Duplicate
      </button>
      <button mat-menu-item class="delete-item" (click)="delete()">
        <mat-icon>delete</mat-icon>Delete
      </button>
    </mat-menu>
  </div>
</div>
